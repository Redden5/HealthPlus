<div id="section-appointments" class="card">
    <div class="card-header">
        Upcoming Appointments
        <div class="card-header-actions">
            <span class="pill" id="apptCount">Loading…</span>
            <button class="req-appt-btn" onclick="openRequestModal()">+ Request</button>
        </div>
    </div>
    <div class="appt-list" id="apptList">
        <div class="appt-loading">Loading…</div>
    </div>

    <!-- My Requests toggle -->
    <div style="margin-top:14px; border-top:1px solid var(--border-light); padding-top:12px;">
        <button class="req-history-toggle" onclick="toggleRequestHistory()" id="reqHistoryToggle">
            My Requests <span id="reqHistoryArrow">▾</span>
        </button>
        <div id="reqHistoryPanel" class="req-history-panel">
            <div id="reqHistoryList"><div class="req-history-loading">Loading…</div></div>
        </div>
    </div>
</div>
