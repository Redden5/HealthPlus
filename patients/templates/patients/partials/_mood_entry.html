<div id="section-mood" class="card">
    <div class="card-header">
        How are you feeling today?
    </div>
    <div class="mood-entry-area" id="moodEntryArea">
        <div class="mood-prompt">Rate your mood from 1 to 10</div>
        <div class="mood-scale" id="moodScale"></div>
        <div class="mood-selected-display" id="moodDisplay">
            <div class="mood-selected-num" id="moodNum"></div>
            <div class="mood-selected-label" id="moodLabel"></div>
        </div>
        <button class="mood-submit-btn" id="moodSubmitBtn" onclick="submitMood()">Log Mood</button>
    </div>
</div>
