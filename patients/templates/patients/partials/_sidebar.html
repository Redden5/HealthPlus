<aside class="sidebar">
    <div class="logo-section">
        <div class="logo-icon">
            <svg viewBox="0 0 28 28" fill="none">
                <circle cx="14" cy="10" r="6" stroke="#6d9ba0" stroke-width="1.5"/>
                <path d="M10 22c0-4 2-6 4-6s4 2 4 6" stroke="#5a8f6e" stroke-width="1.5" fill="none"/>
                <path d="M11 8c1-2 3-2 4 0" stroke="#6d9ba0" stroke-width="1"/>

        <a href="#" class="nav-item" data-target="section-journal">

            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></span>
            Health Records

    <div class="sidebar-logout">
        <form method="post" action="/accounts/logout/">
            {% csrf_token %}
            <button type="submit" class="nav-item nav-item-logout">
                Logout
            </button>
        </form>
    </div>
</aside>
