<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Call | HealthPlus</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #1a1d23;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .call-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: #111318;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        .call-header .logo {
            font-size: 1.1rem;
            font-weight: 600;
            color: #a8c6b8;
            letter-spacing: 0.5px;
        }

        .call-header .room-info {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.45);
        }

        .back-btn {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            transition: all 0.15s;
        }
        .back-btn:hover { color: #fff; border-color: rgba(255,255,255,0.35); }

        #jitsi-container {
            flex: 1;
            width: 100%;
            min-height: calc(100vh - 56px);
        }

        #call-ended {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 16px;
            color: rgba(255,255,255,0.7);
        }

        #call-ended h2 { font-size: 1.4rem; font-weight: 600; }
        #call-ended p  { font-size: 0.9rem; }

        .end-btn {
            margin-top: 8px;
            padding: 10px 24px;
            background: #5a8f6e;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
        }
        .end-btn:hover { background: #4e7d60; }

        #loading-msg {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.45);
        }
    </style>
</head>
<body>

<div class="call-header">
    <span class="logo">HealthPlus</span>
    <span class="room-info">Secure Video Call</span>
    <a href="javascript:history.back()" class="back-btn">← Back</a>
</div>

<div id="loading-msg">Connecting to call…</div>
<div id="jitsi-container"></div>
<div id="call-ended">
    <h2>Call ended</h2>
    <p>You have left the video call.</p>
    <a href="/patients/dashboard/" class="end-btn">Return to Dashboard</a>
</div>

<script src="https://{{ jitsi_domain }}/external_api.js"></script>
<script>
    const ROOM_NAME  = "{{ room_name }}";
    const TOKEN_URL  = "{% url 'patients:jitsi_token' room_name=room_name %}";
    const JITSI_DOMAIN = "{{ jitsi_domain }}";

    async function startCall() {
        document.getElementById('loading-msg').style.display = 'flex';

        let token = null;
        try {
            const res = await fetch(TOKEN_URL, { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
            const data = await res.json();
            token = data.token || null;
        } catch (e) {
            console.warn('Could not fetch Jitsi JWT — proceeding without token (public room).');
        }

        document.getElementById('loading-msg').style.display = 'none';

        const options = {
            roomName: ROOM_NAME,
            parentNode: document.getElementById('jitsi-container'),
            width: '100%',
            height: '100%',
            configOverwrite: {
                startWithAudioMuted: false,
                startWithVideoMuted: false,
                disableDeepLinking: true,
                prejoinPageEnabled: false,
            },
            interfaceConfigOverwrite: {
                TOOLBAR_BUTTONS: [
                    'microphone', 'camera', 'closedcaptions',
                    'desktop', 'fullscreen', 'fodeviceselection',
                    'chat', 'settings', 'raisehand',
                    'videoquality', 'tileview', 'hangup',
                ],
                SHOW_JITSI_WATERMARK: false,
                SHOW_BRAND_WATERMARK: false,
            },
            userInfo: {
                displayName: "{{ request.user.get_full_name|default:request.user.username }}",
                email: "{{ request.user.email }}",
            },
        };

        if (token) {
            options.jwt = token;
        }

        const api = new JitsiMeetExternalAPI(JITSI_DOMAIN, options);

        api.addEventListener('readyToClose', () => {
            document.getElementById('jitsi-container').style.display = 'none';
            document.getElementById('call-ended').style.display = 'flex';
        });
    }

    startCall();
</script>
</body>
</html>
