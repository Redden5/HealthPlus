{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>HealthPlus - Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #adbfa2;
            --dark-text: #333;
            --light-blue: #b9d2d6;
            --border-color: #ddd;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f9f9f9;
        }

        .card {
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 60px;
            width: 400px;
            text-align: center;
        }

        .logo img {
            margin-bottom: 20px;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            color: var(--dark-text);
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #9aaf8e;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: var(--primary-green);
            text-decoration: underline;
            font-size: 14px;
        }

        .error-list {
            background-color: #ffe5e5;
            border: 1px solid #f5c6c6;
            border-radius: 4px;
            padding: 10px 15px;
            margin-bottom: 15px;
            text-align: left;
        }

        .error-list p {
            margin: 4px 0;
            font-size: 13px;
            color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="{% static 'accounts/logo.png' %}" alt="HealthPlus Logo" width="130">
        </div>

        <h1>Forgot Password</h1>
        <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>

        {% if messages %}
            <div class="error-list">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" action="/accounts/forgot-password/">
            {% csrf_token %}
            <div class="input-group">
                <input type="email" name="email" placeholder="Email address" required>
            </div>
            <button type="submit" class="btn-submit">Send Reset Link</button>
        </form>

        <a href="/accounts/login/" class="back-link">Back to login</a>
    </div>
</body>
</html>
