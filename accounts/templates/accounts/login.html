{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>HealthPlus - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
    --primary-green: #adbfa2;
    --dark-text: #333;
    --light-blue: #b9d2d6;
    --border-color: #ddd;
}

body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f9f9f9;
}

.login-container {
    display: flex;
    width: 900px;
    height: 600px;
    background: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    border-radius: 8px;
    overflow: hidden;
}

/* Left Section */
.login-form-section {
    flex: 1.2;
    padding: 60px;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.logo img {
    margin-bottom: 20px;
}

h1 {
    font-size: 28px;
    margin-bottom: 10px;
    color: var(--dark-text);
}

.subtitle {
    color: #666;
    margin-bottom: 30px;
}

.input-group {
    margin-bottom: 15px;
    position: relative;
}

input {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    font-size: 16px;
    box-sizing: border-box;
}

.password-group {
    position: relative; /* Keep the icon anchored inside */
    display: flex;
    align-items: center;
}

#toggle-password {
    position: absolute;
    right: 12px;
    cursor: pointer; /* Makes it clear you can click it */
    z-index: 10;
    opacity: 0.6;
    transition: 0.2s;
}
#toggle-password:hover {
    opacity: 1;
}

.btn-sign-in {
    width: 100%;
    padding: 15px;
    background-color: var(--primary-green);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
}

.forgot-password {
    display: block;
    margin-top: 20px;
    color: var(--primary-green);
    text-decoration: underline;
    font-size: 14px;
}

/* Right Section */
.promo-section {
    flex: 0.8;
    background-color: var(--light-blue);
    padding: 60px;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
}

.promo-section h2 {
    font-size: 26px;
    margin-bottom: 20px;
}

.promo-section p {
    line-height: 1.6;
    margin-bottom: 30px;
    font-size: 15px;
}

.btn-get-started {
    background: transparent;
    border: 2px solid white;
    color: white;
    padding: 12px 25px;
    font-size: 18px;
    font-weight: 600;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.3s;
}

.btn-get-started:hover {
    background: white;
    color: var(--light-blue);
}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-form-section">
            <div class="logo">
                <img src="{% static 'accounts/logo.png' %}" alt="HealthPlus Logo" width="150">
            </div>

            <h1>Welcome back!</h1>
            <p class="subtitle">Log in to your account below.</p>

            <form method="POST" action="/accounts/login/">
                {% csrf_token %}
                <div class="input-group">
                    <input type="text" name="username" placeholder="Username" required>
                </div>
                <div class="input-group password-group">
                    <input type="password" name="password" id="password-field" placeholder="Password" required>

                    <span id="toggle-password" class="password-toggle-icon">
                        <svg width="20" height="20" viewBox="97 33 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M112.5,40.8427734375C111.00390625,37.94921875,108.199951171875,36,104.987060546875,36C101.79296875,36,99.001953125,37.92578125,97.5,40.79296875C99.001953125,43.7158203125,101.79296875,45.64306640625,104.987060546875,45.64306640625C108.198974609375,45.64306640625,111.00390625,43.69287109375,112.5,40.8427734375ZM105,40.01806640625C105.287353515625,40.01806640625,105.552734375,40.17138671875,105.6962890625,40.419921875C105.83984375,40.6689453125,105.83984375,40.97509765625,105.6962890625,41.22412109375C105.552734375,41.47265625,105.287353515625,41.6259765625,105,41.6259765625C104.555908203125,41.6259765625,104.196044921875,41.26611328125,104.196044921875,40.82177734375C104.196044921875,40.3779296875,104.555908203125,40.01806640625,105,40.01806640625Z"
                                  stroke="#8f9da3"
                                  stroke-width="1.2"
                                  stroke-linecap="round"/>
                        </svg>
                    </span>
                </div>
                <button type="submit" class="btn-sign-in">Sign In</button>
            </form>

            <a href="#" class="forgot-password">Forgot your password?</a>
        </div>

        <div class="promo-section">
            <h2>Don’t have an account?</h2>
            <p>Create an account to access your health information and connect with your care team — fast, secure, and confidential.</p>
            <form method="POST" style="margin: 0;" >
                      {% csrf_token %}
                    <input type="hidden" name="action" value="createAccount">
                    <button type="submit" class="btn-get-started">Let's Get Started</button>
                </form>
        </div>
    </div>
<script>
    const togglePassword = document.querySelector('#toggle-password');
    const passwordField = document.querySelector('#password-field');

    togglePassword.addEventListener('click', function () {
        // Toggle the type attribute
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);

        // Optional: Toggle the icon opacity or color to show it's active
        this.style.opacity = type === '1' ;
    });
</script>
</body>
</html>
