{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>HealthPlus - Reset Link Sent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #adbfa2;
            --dark-text: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f9f9f9;
        }

        .card {
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 60px;
            width: 400px;
            text-align: center;
        }

        .logo img {
            margin-bottom: 20px;
        }

        .check-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--dark-text);
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .back-link {
            display: inline-block;
            color: var(--primary-green);
            text-decoration: underline;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="{% static 'accounts/logo.png' %}" alt="HealthPlus Logo" width="130">
        </div>

        <div class="check-icon">&#10003;</div>
        <h1>Check your email</h1>
        <p class="subtitle">
            If an account with that email exists, we've sent a password reset link.
            Please check your inbox and follow the instructions.
        </p>

        <a href="/accounts/login/" class="back-link">Back to login</a>
    </div>
</body>
</html>
