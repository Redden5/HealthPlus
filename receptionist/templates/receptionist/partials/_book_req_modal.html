<div class="modal-overlay" id="bookReqModal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Book Appointment from Request</span>
            <button class="modal-close" onclick="closeBookModal()">&times;</button>
        </div>

        <input type="hidden" id="bReqId">

        <div class="modal-req-info">
            <strong id="bPatientName"></strong>
            <div class="modal-req-meta" id="bRequestMeta"></div>
        </div>

        <div class="form-group">
            <label class="form-label">Doctor</label>
            <select class="form-control" id="bDoctor"></select>
        </div>

        <div class="form-group">
            <label class="form-label">Title</label>
            <input type="text" class="form-control" id="bTitle">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Type</label>
                <select class="form-control" id="bType">
                    <option value="therapy">Therapy Session</option>
                    <option value="medication">Medication Check-in</option>
                    <option value="consultation">General Consultation</option>
                    <option value="followup">Follow-up</option>
                    <option value="assessment">Assessment</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Duration (min)</label>
                <input type="number" class="form-control" id="bDuration" value="60" min="15" step="15">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Date &amp; Time</label>
                <input type="datetime-local" class="form-control" id="bDateTime">
            </div>
            <div class="form-group">
                <label class="form-label">Location</label>
                <input type="text" class="form-control" id="bLocation" placeholder="Room / Online">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Notes</label>
            <textarea class="form-control" id="bNotes"></textarea>
        </div>

        <div class="form-feedback" id="bFeedback"></div>

        <div class="modal-actions">
            <button class="btn-secondary" onclick="closeBookModal()">Cancel</button>
            <button class="btn-primary" id="bSaveBtn" onclick="saveBookFromRequest()">Confirm &amp; Notify Patient</button>
        </div>
    </div>
</div>
