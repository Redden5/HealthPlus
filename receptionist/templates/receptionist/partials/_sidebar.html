<aside class="sidebar">
    <div class="logo-section">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#6d9ba0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
        </div>
        <div class="logo-text">HealthPlus<br><span class="logo-sub">Mental Health</span></div>
    </div>

    <nav class="nav-menu">
        <a class="nav-item active">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
            Appointments
        </a>
        <a class="nav-item">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
            Patients
        </a>
        <a class="nav-item">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
            Doctors
        </a>
    </nav>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-user">
        <div class="sidebar-avatar">{{ profile.first_name|make_list|first }}{{ profile.last_name|make_list|first }}</div>
        <div>
            <div class="sidebar-user-name">{{ profile.first_name }} {{ profile.last_name }}</div>
            <div class="sidebar-user-role">Receptionist</div>
        </div>
    </div>

    <div class="sidebar-logout">
        <form method="post" action="/accounts/logout/">
            {% csrf_token %}
            <button type="submit" class="nav-item nav-item-logout">
                Logout
            </button>
        </form>
    </div>
</aside>
