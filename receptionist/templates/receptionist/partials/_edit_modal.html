<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Edit Appointment</span>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>

        <input type="hidden" id="mApptId">

        <div class="form-group">
            <label class="form-label">Title</label>
            <input type="text" class="form-control" id="mTitle">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Type</label>
                <select class="form-control" id="mType">
                    <option value="therapy">Therapy Session</option>
                    <option value="medication">Medication Check-in</option>
                    <option value="consultation">General Consultation</option>
                    <option value="followup">Follow-up</option>
                    <option value="assessment">Assessment</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Status</label>
                <select class="form-control" id="mStatus">
                    <option value="scheduled">Scheduled</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="completed">Completed</option>
                    <option value="no_show">No Show</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Date &amp; Time</label>
                <input type="datetime-local" class="form-control" id="mDateTime">
            </div>
            <div class="form-group">
                <label class="form-label">Duration (min)</label>
                <input type="number" class="form-control" id="mDuration" min="15" step="15">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Location</label>
            <input type="text" class="form-control" id="mLocation">
        </div>

        <div class="form-group">
            <label class="form-label">Notes</label>
            <textarea class="form-control" id="mNotes"></textarea>
        </div>

        <div class="form-feedback" id="modalFeedback"></div>

        <div class="modal-actions">
            <button class="btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn-primary" id="modalSaveBtn" onclick="saveEdit()">Save Changes</button>
        </div>
    </div>
</div>
