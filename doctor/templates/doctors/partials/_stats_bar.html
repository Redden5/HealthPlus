<div class="stats-bar">
    <div class="stat-card">
        <div class="stat-label">Patients Today</div>
        <div class="stat-value" id="statPatientsToday">{{ patients_today }}</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Upcoming Meetings</div>
        <div class="stat-value" id="statMeetings">—</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Unread Messages</div>
        <div class="stat-value" id="statUnreadMessages">—</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Pending Lab Results</div>
        <div class="stat-value" id="statPendingLabs">{{ pending_labs }}</div>
    </div>
</div>
